name: Check WireGuard
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install alibabacloud_ecs20140526
      - name: Check WireGuard status
        env:
          ALIBABA_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          ALIBABA_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
        run: |
          python -c "
          import scripts.ecs_control as ecs
          output = ecs.run_command(r'''
          wg show all
          ''')
          print(output if output else 'NO OUTPUT')
          "
