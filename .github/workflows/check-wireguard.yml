name: Check WireGuard
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install alibabacloud_ecs20140526
      - name: Check WireGuard status
        env:
          ALIBABA_ACCESS_KEY_ID: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          ALIBABA_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
        run: |
          python -c "
          import scripts.ecs_control as ecs
          output = ecs.run_command(r'''
          Write-Host '=== SDGO Processes ==='
          Get-Process -Name AgentServer,WorldServer,StoreServer,ChattingServer,BattleServer,SdgoMonitorServer,SDGOMonitorAgent,sqlservr -ErrorAction SilentlyContinue | Format-Table Name, Id, CPU, WorkingSet -AutoSize

          Write-Host '=== Listening Ports ==='
          netstat -ano | Select-String 'LISTEN' | Select-String '(1433|5001|9101|9301|9801|9901)'

          Write-Host '=== Startup Log ==='
          if (Test-Path C:\SDGO\startup.log) { Get-Content C:\SDGO\startup.log -Tail 20 } else { Write-Host 'No startup.log found' }
          ''', timeout=30)
          print(output if output else 'NO OUTPUT')
          "
